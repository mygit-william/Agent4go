<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanobot Web</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>🤖 Nanobot</h1>
                <button class="btn-new" id="btn-new-chat" title="新建会话">+</button>
            </div>
            <div class="session-list" id="session-list">
                <!-- 会话列表动态生成 -->
            </div>
        </aside>

        <!-- 主聊天区 -->
        <main class="chat-container">
            <div class="chat-header">
                <button class="btn-toggle-sidebar" id="btn-toggle-sidebar">☰</button>
                <span class="chat-title" id="chat-title">新会话</span>
            </div>

            <div class="messages" id="messages">
                <div class="welcome">
                    <h2>👋 你好！我是 Nanobot</h2>
                    <p>输入任务开始执行，我可以帮你读写文件、执行命令、编辑代码等。</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <textarea
                        id="message-input"
                        placeholder="输入任务..."
                        rows="1"
                    ></textarea>
                    <button class="btn-send" id="btn-send">➤</button>
                </div>
                <div class="input-hint">Enter 发送，Shift+Enter 换行</div>
            </div>
        </main>
    </div>

    <script src="/app.js"></script>
</body>
</html>
