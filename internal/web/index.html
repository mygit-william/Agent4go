<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanobot - AI Assistant</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">🤖</div>
                <span class="logo-text">Nanobot</span>
                <button class="btn-new" id="btn-new-chat" title="新建会话">+</button>
            </div>

            <div class="sidebar-profile">
                <div class="profile-avatar">U</div>
                <span class="profile-name">User</span>
                <span class="profile-chevron">›</span>
            </div>

            <div class="session-list" id="session-list">
                <!-- 会话列表动态生成 -->
            </div>
        </aside>

        <!-- 主聊天区 -->
        <main class="chat-container">
            <div class="chat-header">
                <button class="btn-toggle-sidebar" id="btn-toggle-sidebar">☰</button>
                <span class="chat-title" id="chat-title">新会话</span>
                <div class="chat-actions">
                    <button class="chat-action-btn" id="btn-settings" title="设置">⚙️</button>
                    <button class="theme-toggle" id="theme-toggle" title="切换主题">🌙</button>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="messages-inner">
                    <div class="welcome">
                        <div class="welcome-logo">🤖</div>
                        <h2>你好！我是 Nanobot</h2>
                        <p>输入任务开始执行，我可以帮你读写文件、执行命令、编辑代码等。</p>
                        <div class="welcome-suggestions">
                            <button class="suggestion-btn">📝 帮我写一个 Go 的 HTTP 服务器</button>
                            <button class="suggestion-btn">🔧 分析项目目录结构并优化</button>
                            <button class="suggestion-btn">📊 读取并总结最近的日志文件</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <div class="input-box">
                        <textarea id="message-input" placeholder="输入任务或问题..." rows="1"></textarea>
                        <div class="input-toolbar">
                            <div class="input-tools">
                                <button class="input-tool-btn" title="附件">📎</button>
                            </div>
                            <div class="input-right">
                                <button class="btn-send" id="btn-send">➤</button>
                            </div>
                        </div>
                    </div>
                    <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
                </div>
            </div>
        </main>
    </div>

    <script src="/app.js"></script>
</body>
</html>
